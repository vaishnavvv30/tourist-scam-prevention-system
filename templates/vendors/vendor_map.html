{% extends 'base.html' %}
{% block title %}Vendor Map{% endblock %}
{% block content %}
<div class="container-fluid py-4 px-4">
    <div class="page-header">
        <h1><i class="bi bi-map me-2"></i>Vendor <span class="text-gradient">Map</span></h1>
        <p class="text-muted">Find trusted vendors near you</p>
    </div>
    <div class="glass-card-static p-2">
        <div id="vendor-map" class="map-container" style="height:600px;"></div>
    </div>
    <div class="d-flex gap-3 mt-3 justify-content-center">
        <span class="badge-glass"><span style="width:10px;height:10px;border-radius:50%;background:#10b981;display:inline-block;"></span> Verified</span>
        <span class="badge-glass"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;"></span> Unverified</span>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const vendors = {{ vendors_json|safe }};
        initVendorMap('vendor-map', vendors);
    });
</script>
{% endblock %}
