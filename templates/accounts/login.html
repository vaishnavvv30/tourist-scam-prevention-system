{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ScamGuard AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-logo">
                <i class="bi bi-shield-check fs-1" style="color:var(--accent-primary);"></i>
                <h2 class="mt-2">Welcome Back</h2>
                <p class="text-muted">Sign in to your ScamGuard AI account</p>
            </div>
            {% if form.errors %}
            <div class="alert-glass alert-danger mb-3">
                <i class="bi bi-x-circle"></i>
                <span>Invalid username or password.</span>
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary-glow w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            <p class="text-center text-muted mb-0">
                Don't have an account? <a href="{% url 'accounts:register' %}">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
